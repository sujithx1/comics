<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Chronicles: The Time-Traveler's Manual</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Short+Stack&family=Fira+Code:wght@400;700&display=swap');

        :root {
            --ink: #0d1117;
            --paper: #ffffff;
            --git-red: #f1502f;
            --git-orange: #f34f29;
            --branch-purple: #a29bfe;
            --commit-green: #2eb67d;
            --gold: #ffb86c;
        }

        body {
            background-color: #0d1117; /* GitHub Dark Theme */
            background-image: 
                radial-gradient(rgba(241, 80, 47, 0.1) 1px, transparent 0),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 20px 20px, 50px 50px, 50px 50px;
            font-family: 'Short Stack', cursive;
            margin: 0;
            color: var(--ink);
        }

        .page-wrapper {
            max-width: 900px;
            margin: 40px auto;
            background: var(--paper);
            border: 8px solid var(--ink);
            box-shadow: 20px 20px 0px var(--git-red);
            padding: 40px;
            position: relative;
        }

        /* --- Git Header --- */
        header {
            text-align: center;
            border-bottom: 6px solid var(--ink);
            padding-bottom: 20px;
            margin-bottom: 40px;
            background: #fff;
        }

        .logo {
            font-family: 'Bangers';
            font-size: 6rem;
            color: var(--git-red);
            line-height: 0.8;
            margin: 0;
            text-shadow: 4px 4px 0 var(--ink);
            transform: rotate(-1deg);
        }

        .issue-tag {
            font-family: 'Permanent Marker';
            background: var(--ink);
            color: white;
            padding: 5px 20px;
            display: inline-block;
            transform: translateY(-20px) rotate(2deg);
        }

        /* --- Grid Engine --- */
        .chapter-title {
            font-family: 'Bangers';
            font-size: 2.5rem;
            color: white;
            background: var(--ink);
            padding: 10px 20px;
            margin: 40px 0 20px -50px;
            width: fit-content;
            clip-path: polygon(0% 0%, 95% 0%, 100% 50%, 95% 100%, 0% 100%);
        }

        .comic-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            border: 4px solid var(--ink);
            min-height: 320px;
            position: relative;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            transition: 0.3s;
        }

        .panel:hover {
            transform: scale(1.02);
            z-index: 10;
        }

        .bubble {
            background: #fff;
            border: 3px solid var(--ink);
            border-radius: 20px;
            padding: 10px 15px;
            margin: 15px;
            font-weight: bold;
            position: relative;
            z-index: 2;
        }

        .bubble.junior { border-color: var(--git-orange); }
        .bubble.wizard { border-color: var(--branch-purple); align-self: flex-end; }

        .narrator {
            background: var(--gold);
            padding: 5px 10px;
            font-family: 'Permanent Marker';
            font-size: 0.8rem;
            border-bottom: 3px solid var(--ink);
            border-right: 3px solid var(--ink);
            width: fit-content;
        }

        .art {
            font-size: 6rem;
            text-align: center;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(5px 5px 0 rgba(0,0,0,0.1));
        }

        .onomatopoeia {
            font-family: 'Bangers';
            color: var(--git-red);
            font-size: 3rem;
            position: absolute;
            bottom: 10px;
            right: 10px;
            transform: rotate(-15deg);
        }

        /* --- Git Cheat Sheet --- */
        .cheat-sheet {
            background: #fdf6e3;
            border: 4px solid var(--ink);
            padding: 20px;
            margin-bottom: 60px;
            font-family: 'Fira Code', monospace;
            box-shadow: 8px 8px 0 var(--ink);
        }

        .cheat-sheet h3 { font-family: 'Bangers'; font-size: 1.8rem; margin: 0 0 15px 0; color: var(--git-red); }

        .cmd-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #ccc;
        }

        code { color: var(--git-red); font-weight: 700; background: #eee; padding: 2px 5px; }

        footer {
            text-align: center;
            border-top: 6px solid var(--ink);
            padding-top: 40px;
            font-family: 'Bangers';
            font-size: 2.5rem;
            color: var(--git-red);
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <header>
        <h1 class="logo">GIT<br>CHRONICLES</h1>
        <div class="issue-tag">ISSUE #01: THE TEMPORAL SNAPSHOT</div>
    </header>

    <div id="comic-engine"></div>

    <footer>TO BE CONTINUED IN... THE MERGE CONFLICT!</footer>
</div>

<script>
    const gitStories = [
        {
            title: "THE FIRST SNAPSHOT",
            color: "#f1502f",
            panels: [
                { type: "junior", text: "I made a mess! I need a save point before everything breaks!", art: "⏳", noise: "PANIC!", note: "TIMESTAMP: 09:00 AM" },
                { type: "wizard", text: "Initialize the vortex with <code>git init</code> and <code>commit</code> your soul!", art: "📦", noise: "SYNC!" }
            ],
            commands: [
                { cmd: "git init", desc: "Start a new timeline" },
                { cmd: "git add .", desc: "Stage your changes" },
                { cmd: "git commit -m", desc: "Save snapshot permanently" }
            ]
        },
        {
            title: "ALTERNATE REALITIES",
            color: "#a29bfe",
            panels: [
                { type: "junior", text: "Can I try something risky without killing the main app?", art: "🧪", noise: "SPLIT!", note: "DIMENSION SHIFTING..." },
                { type: "wizard", text: "Create a <code>branch</code>! It's a parallel universe for your code.", art: "🌿", noise: "BRANCH!" }
            ],
            commands: [
                { cmd: "git branch", desc: "Create new reality" },
                { cmd: "git checkout", desc: "Jump between worlds" },
                { cmd: "git merge", desc: "Combine timelines" }
            ]
        },
        {
            title: "THE DISTANT CLOUD",
            color: "#2eb67d",
            panels: [
                { type: "junior", text: "My computer exploded! Is my history gone forever?", art: "🔥", noise: "NOOO!", note: "THE HARDWARE FAIL..." },
                { type: "wizard", text: "Not if you <code>push</code> to the remote nebula! Github is eternal.", art: "☁️", noise: "UPLOAD!" }
            ],
            commands: [
                { cmd: "git remote add", desc: "Link to a cloud nebula" },
                { cmd: "git push", desc: "Send history to cloud" },
                { cmd: "git pull", desc: "Sync with the collective" }
            ]
        },
        {
    title: "THE MERGE MONSTER",
    color: "#ff003c", // Bright red for conflict
    panels: [
        { 
            type: "junior", 
            text: "I tried to merge, but the code is screaming! Two versions of the same line?!", 
            art: "👾", 
            noise: "CONFLICT!", 
            note: "THE TEMPORAL COLLISION..." 
        },
        { 
            type: "wizard", 
            text: "Fear not! Open the file, choose the true reality, and <code>git add</code> to seal the rift.", 
            art: "⚔️", 
            noise: "RESOLVED!" 
        }
    ],
    commands: [
        { cmd: "git merge [branch]", desc: "Combine two realities" },
        { cmd: "git diff", desc: "See the points of conflict" },
        { cmd: "git merge --abort", desc: "Run away from the monster" }
    ]
},
{
    title: "THE REBASE REWRITE",
    color: "#00b894", // Mint green for clean history
    panels: [
        { 
            type: "junior", 
            text: "My history is a mess of tiny commits! It looks like a spaghetti factory!", 
            art: "🍝", 
            noise: "MESSY!", 
            note: "CLEANING THE TIMELINE..." 
        },
        { 
            type: "wizard", 
            text: "Use <code>rebase</code> to rewrite history! It's like you never made those mistakes.", 
            art: "✨", 
            noise: "SMOOTH!" 
        }
    ],
    commands: [
        { cmd: "git rebase master", desc: "Move your work to the front of the line" },
        { cmd: "git rebase -i", desc: "Interactive: Squash or Rename history" },
        { cmd: "git log --graph", desc: "See the beautiful branch tree" }
    ]
},
{
    title: "THE GREAT RESET",
    color: "#636e72", // Dark gray for the "Eraser"
    panels: [
        { 
            type: "junior", 
            text: "I committed a password! And a 2GB cat video! I need it GONE!", 
            art: "🧨", 
            noise: "BOOM!", 
            note: "THE NUCLEAR OPTION..." 
        },
        { 
            type: "wizard", 
            text: "The <code>reset</code> spell is dangerous. Use <code>--soft</code> to keep your work, or <code>--hard</code> to erase it from existence!", 
            art: "☢️", 
            noise: "ERASED!" 
        }
    ],
    commands: [
        { cmd: "git reset --soft", desc: "Undo commit, keep the changes" },
        { cmd: "git reset --hard", desc: "Wipe everything to last save" },
        { cmd: "git revert", desc: "Create a 'Fix' commit (The Safe Way)" }
    ]
}
    ];

    const container = document.getElementById('comic-engine');

    gitStories.forEach(story => {
        const section = document.createElement('section');
        
        const panels = story.panels.map(p => `
            <div class="panel">
                ${p.note ? `<div class="narrator">${p.note}</div>` : ''}
                <div class="bubble ${p.type}">${p.text}</div>
                <div class="art">${p.art}</div>
                <div class="onomatopoeia">${p.noise}</div>
            </div>
        `).join('');

        const cmds = story.commands.map(c => `
            <div class="cmd-item">
                <code>${c.cmd}</code>
                <span>${c.desc}</span>
            </div>
        `).join('');

        section.innerHTML = `
            <div class="chapter-title" style="background: ${story.color}">${story.title}</div>
            <div class="comic-row">${panels}</div>
            <div class="cheat-sheet">
                <h3>📜 CHRONO-COMMANDS</h3>
                ${cmds}
            </div>
        `;
        container.appendChild(section);
    });
</script>

</body>
</html>
